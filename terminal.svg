<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="100%" style="max-width:700px">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="700" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4DB6AC"/>
      <stop offset="35%"  stop-color="#00897B"/>
      <stop offset="68%"  stop-color="#00695C"/>
      <stop offset="100%" stop-color="#002B25"/>
    </linearGradient>
    <clipPath id="mc">
      <circle cx="575" cy="190" r="67"/>
    </clipPath>
    <!-- mountain clip paths -->
    <clipPath id="clL">  <polygon points="155,95 312,340 24,340"/></clipPath>
    <clipPath id="clM1"> <polygon points="288,148 418,340 168,340"/></clipPath>
    <clipPath id="clM2"> <polygon points="388,175 468,340 312,340"/></clipPath>
    <clipPath id="clS1"> <polygon points="448,210 496,340 403,340"/></clipPath>
    <clipPath id="clS2"> <polygon points="470,228 510,340 438,340"/></clipPath>
    <style>
      @keyframes tw  { 0%,100%{fill-opacity:.1}  50%{fill-opacity:.9} }
      @keyframes ma  { 0%,100%{stroke:#003530} 50%{stroke:#4DB6AC} }
      @keyframes mb  { 0%,100%{stroke:#002825} 35%{stroke:#26A69A} 70%{stroke:#00897B} 100%{stroke:#002825} }
      @keyframes mc  { 0%,100%{stroke:#003530} 50%{stroke:#80CBC4} }
      @keyframes md  { 0%{stroke:#003530} 30%{stroke:#26A69A} 65%{stroke:#4DB6AC} 100%{stroke:#003530} }
      @keyframes me  { 0%,100%{stroke:#002825} 50%{stroke:#2A9B8F} }
      @keyframes mcA { 0%,100%{stroke:#1A6860;opacity:.5} 50%{stroke:#80CBC4;opacity:1} }
      @keyframes mt1 { 0%,100%{fill:#004D40} 40%{fill:#26A69A} 65%{fill:#00897B} }
      @keyframes mt2 { 0%{fill:#003535} 30%{fill:#00897B} 62%{fill:#4DB6AC} 100%{fill:#003535} }
      @keyframes mt3 { 0%,100%{fill:#003030} 50%{fill:#26A69A} }
      @keyframes gr  { 0%,100%{fill:#002522} 50%{fill:#003535} }
      @keyframes bA  { 0%,100%{fill:#1A5A54;fill-opacity:.3} 50%{fill:#80CBC4;fill-opacity:1} }

      .s1{fill:#80CBC4;animation:tw 2.3s infinite}
      .s2{fill:#B2DFDB;animation:tw 3.7s .9s infinite}
      .s3{fill:#E0F7FA;animation:tw 2.0s 1.6s infinite}
      .m1{stroke:#003530;stroke-linecap:butt;animation:ma 5.3s 0.0s ease-in-out infinite}
      .m2{stroke:#002825;stroke-linecap:butt;animation:mb 6.7s 0.4s ease-in-out infinite}
      .m3{stroke:#003530;stroke-linecap:butt;animation:mc 4.9s 1.2s ease-in-out infinite}
      .m4{stroke:#003530;stroke-linecap:butt;animation:md 7.1s 2.1s ease-in-out infinite}
      .m5{stroke:#002825;stroke-linecap:butt;animation:me 5.8s 0.8s ease-in-out infinite}
      .mcirc{fill:none;stroke:#1A6860;animation:mcA 8s ease-in-out infinite}
      .mnL {fill:#004D40;animation:mt1 7.3s 0.0s ease-in-out infinite}
      .mnM1{fill:#003D35;animation:mt2 6.1s 1.2s ease-in-out infinite}
      .mnM2{fill:#003A32;animation:mt1 8.1s 0.7s ease-in-out infinite}
      .mnS1{fill:#003030;animation:mt3 5.7s 2.3s ease-in-out infinite}
      .mnS2{fill:#002D2A;animation:mt2 6.8s 3.5s ease-in-out infinite}
      .gr  {fill:#002522;animation:gr  9.0s 0.5s ease-in-out infinite}
      .bi {fill:#1A5A54;animation:bA 5s ease-in-out infinite}
      .bi2{fill:#1A5A54;animation:bA 5s 2.5s ease-in-out infinite}
    </style>
  </defs>

