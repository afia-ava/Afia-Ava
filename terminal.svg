<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="100%" style="max-width:700px">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="700" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8E7498"/>
      <stop offset="35%"  stop-color="#5E4A72"/>
      <stop offset="68%"  stop-color="#4A3860"/>
      <stop offset="100%" stop-color="#261A3A"/>
    </linearGradient>
    <clipPath id="mc">
      <circle cx="575" cy="190" r="67"/>
    </clipPath>
    <clipPath id="clL">  <polygon points="155,95 312,340 24,340"/></clipPath>
    <clipPath id="clM1"> <polygon points="288,148 418,340 168,340"/></clipPath>
    <clipPath id="clM2"> <polygon points="388,175 468,340 312,340"/></clipPath>
    <clipPath id="clS1"> <polygon points="448,210 496,340 403,340"/></clipPath>
    <clipPath id="clS2"> <polygon points="470,228 510,340 438,340"/></clipPath>
    <style>
      @keyframes tw  { 0%,100%{fill-opacity:.1}  50%{fill-opacity:.9} }
      @keyframes ma  { 0%,100%{stroke:#1C1430} 50%{stroke:#8E7498} }
      @keyframes mb  { 0%,100%{stroke:#161028} 35%{stroke:#5E4A72} 70%{stroke:#7A6488} 100%{stroke:#161028} }
      @keyframes mc  { 0%,100%{stroke:#1C1430} 50%{stroke:#B8A8C2} }
      @keyframes md  { 0%{stroke:#1C1430} 30%{stroke:#5E4A72} 65%{stroke:#8E7498} 100%{stroke:#1C1430} }
      @keyframes me  { 0%,100%{stroke:#161028} 50%{stroke:#6A5278} }
      @keyframes mcA { 0%,100%{stroke:#3A2850;opacity:.5} 50%{stroke:#B8A8C2;opacity:1} }
      @keyframes mt1 { 0%,100%{fill:#5A4470} 40%{fill:#9A82AA} 65%{fill:#7E6892} }
      @keyframes mt2 { 0%{fill:#3E2E58} 30%{fill:#8070A0} 62%{fill:#B0A0C0} 100%{fill:#3E2E58} }
      @keyframes mt3 { 0%,100%{fill:#342450} 50%{fill:#7E6892} }
      @keyframes gr  { 0%,100%{fill:#0E0A1C} 50%{fill:#1A1230} }
      @keyframes bA  { 0%,100%{fill:#2C2040;fill-opacity:.3} 50%{fill:#B8A8C2;fill-opacity:1} }

      .s1{fill:#8E7498;animation:tw 2.3s infinite}
      .s2{fill:#B8A8C2;animation:tw 3.7s .9s infinite}
      .s3{fill:#D8CDE2;animation:tw 2.0s 1.6s infinite}
      .m1{stroke:#1C1430;stroke-linecap:butt;animation:ma 5.3s 0.0s ease-in-out infinite}
      .m2{stroke:#161028;stroke-linecap:butt;animation:mb 6.7s 0.4s ease-in-out infinite}
      .m3{stroke:#1C1430;stroke-linecap:butt;animation:mc 4.9s 1.2s ease-in-out infinite}
      .m4{stroke:#1C1430;stroke-linecap:butt;animation:md 7.1s 2.1s ease-in-out infinite}
      .m5{stroke:#161028;stroke-linecap:butt;animation:me 5.8s 0.8s ease-in-out infinite}
      .mcirc{fill:none;stroke:#3A2850;animation:mcA 8s ease-in-out infinite}
      .mnL {fill:#5A4470;animation:mt1 7.3s 0.0s ease-in-out infinite}
      .mnM1{fill:#4A3468;animation:mt2 6.1s 1.2s ease-in-out infinite}
      .mnM2{fill:#3E2E58;animation:mt1 8.1s 0.7s ease-in-out infinite}
      .mnS1{fill:#362850;animation:mt3 5.7s 2.3s ease-in-out infinite}
      .mnS2{fill:#2C2048;animation:mt2 6.8s 3.5s ease-in-out infinite}
      .gr  {fill:#0E0A1C;animation:gr  9.0s 0.5s ease-in-out infinite}
      .bi {fill:#2C2040;animation:bA 5s ease-in-out infinite}
      .bi2{fill:#2C2040;animation:bA 5s 2.5s ease-in-out infinite}
    </style>
  </defs>

  <rect width="700" height="450" rx="16" fill="url(#grad)"/>
  <rect x="16" y="16" width="668" height="418" rx="10" fill="#0C0814"/>
